<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Register - Institute</title>
</head>
<body>
  <h1>Register</h1>
  <form id="registerForm">
    <label>First name: <input name="firstName" required></label><br>
    <label>Last name: <input name="lastName" required></label><br>
    <label>Phone: <input name="phone" required></label><br>
    <label>Email: <input name="email" type="email" required></label><br>
    <label>Grade: <input name="grade" required></label><br>
    <label>Password: <input name="password" type="password" required></label><br>
    <button type="submit">Register</button>
  </form>
  <div id="msg"></div>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const data = {
        firstName: form.firstName.value,
        lastName: form.lastName.value,
        phone: form.phone.value,
        email: form.email.value,
        grade: form.grade.value,
        password: form.password.value
      };
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      const json = await res.json();
      const msg = document.getElementById('msg');
      if (res.ok) msg.innerText = 'Registered successfully. You can now login.';
      else msg.innerText = json.error || JSON.stringify(json);
    });
  </script>
</body>
</html>
